{% extends "console/layout.html" %}
{% block content %}
{% if let Some(h) = heading %}<h2>{{ h }}</h2>{% endif %}
{% if is_error %}<p class="error" role="alert">{{ message }}</p>{% else %}<p>{{ message }}</p>{% endif %}
{% if let Some(href) = back_href %}<p><a href="{{ href }}">{{ back_label }}</a></p>{% endif %}
{% endblock %}
