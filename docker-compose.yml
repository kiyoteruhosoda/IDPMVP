services:
  mariadb:
    image: mariadb:10.11
    environment:
      MARIADB_DATABASE: ${MARIADB_DATABASE:-idp}
      MARIADB_USER: ${MARIADB_USER:-idp}
      # 秘密情報は .env で一元管理する（.env.example を参照。scripts/init.sh が生成）。
      MARIADB_PASSWORD: ${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}
      MARIADB_ROOT_PASSWORD: ${MARIADB_ROOT_PASSWORD:?set MARIADB_ROOT_PASSWORD in .env}
    ports:
      - "${MARIADB_PORT:-3306}:3306"
    volumes:
      - mariadb_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "healthcheck.sh", "--connect", "--innodb_initialized"]
      interval: 5s
      timeout: 5s
      retries: 20

  # IdP 本体（axum）。マイグレーション適用は行わず、起動時に version 照合のみ（fail-fast）。
  # DDL 適用は scripts/deploy.sh の専用ジョブ（sqlx migrate run）で単独実行する。
  web:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      ISSUER: ${ISSUER:-http://localhost:8080}
      BIND_ADDR: 0.0.0.0:8080
      # サービス名 mariadb で解決する（Compose ネットワーク内）。
      DATABASE_URL: mysql://${MARIADB_USER:-idp}:${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}@mariadb:3306/${MARIADB_DATABASE:-idp}
      DB_MAX_CONNECTIONS: ${DB_MAX_CONNECTIONS:-10}
      LOG_FORMAT: ${LOG_FORMAT:-json}
      RUST_LOG: ${RUST_LOG:-info,idp=info}
      KEY_ENCRYPTION_KEY: ${KEY_ENCRYPTION_KEY:?set KEY_ENCRYPTION_KEY in .env}
      # 未指定（空）なら issuer のスキームから自動判定（https で有効）。空は app 側で未設定扱い。
      COOKIE_SECURE: ${COOKIE_SECURE:-}
    ports:
      - "${WEB_PORT:-8080}:8080"
    depends_on:
      mariadb:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8080/healthz"]
      interval: 10s
      timeout: 3s
      retries: 5
      start_period: 20s

  # DDL・マスタデータ適用の専用ワンショットジョブ。常駐させないため profiles で通常起動から除外し、
  # `docker compose run --rm migrate` で単独実行する（scripts/init.sh・deploy.sh が使用）。
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: migrate
    environment:
      DATABASE_URL: mysql://${MARIADB_USER:-idp}:${MARIADB_PASSWORD:?set MARIADB_PASSWORD in .env}@mariadb:3306/${MARIADB_DATABASE:-idp}
    depends_on:
      mariadb:
        condition: service_healthy
    profiles: ["tools"]

  # セッションストアは MVP では MariaDB 単独で完結させる。Redis はスケール時に有効化する。
  redis:
    image: redis:7
    command: ["redis-server", "--requirepass", "${REDIS_PASSWORD:-redis}"]
    ports:
      - "${REDIS_PORT:-6379}:6379"
    profiles: ["optional"]

volumes:
  mariadb_data:
